<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website Builder Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        /* Matches the user's native Telegram theme colors automatically */
        background-color: var(--tg-theme-bg-color, #f3f4f6);
        color: var(--tg-theme-text-color, #111827);
      }
      .btn-primary {
        background-color: var(--tg-theme-button-color, #3b82f6);
        color: var(--tg-theme-button-text-color, #ffffff);
      }
      /* Smooth transitions for the pricing cards */
      .tier-card {
        transition: all 0.2s ease-in-out;
      }
    </style>
  </head>
  <body class="p-4 md:p-6">
    <div
      class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6 mt-2"
    >
      <h2 class="text-2xl font-bold mb-2 text-gray-800">
        Launch Your Website 🚀
      </h2>
      <p class="text-gray-600 mb-6 text-sm">
        Fill in your details below. Our AI will use this exact info to code your
        site!
      </p>

      <form id="businessForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Business Name</label
          >
          <input
            type="text"
            id="businessName"
            required
            placeholder="e.g. Brussels Pizza Pro"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >What do you do?</label
          >
          <textarea
            id="description"
            required
            rows="2"
            placeholder="e.g. We make the best wood-fired pizza in the city."
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Pages Needed</label
          >
          <input
            type="text"
            id="pages"
            required
            placeholder="e.g. Home, Menu, Contact"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Pricing / Core Services</label
          >
          <textarea
            id="pricing"
            required
            rows="2"
            placeholder="e.g. Margherita $10, Pepperoni $12"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          ></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Location (For Google Maps)</label
          >
          <input
            type="text"
            id="location"
            required
            placeholder="e.g. Sint-Jans-Molenbeek, Brussels"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700"
            >Contact Info</label
          >
          <input
            type="text"
            id="contact"
            required
            placeholder="e.g. Phone or Email"
            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          />
        </div>

        <div class="pt-2">
          <label class="block text-sm font-medium text-gray-700 mb-2"
            >Select Your Package</label
          >
          <div class="grid grid-cols-2 gap-3">
            <label
              id="label-pro"
              class="tier-card relative border-2 border-blue-500 bg-blue-50 rounded-lg p-3 cursor-pointer hover:bg-gray-50 flex flex-col items-center text-center"
            >
              <input
                type="radio"
                name="tier"
                value="pro"
                class="hidden"
                checked
                onchange="updateTier('pro', 5)"
              />
              <span class="font-bold text-gray-800 text-sm">Professional</span>
              <span class="text-blue-600 font-extrabold text-lg mt-1">$5</span>
              <span class="text-xs text-gray-500 mt-1">Standard AI Design</span>
            </label>

            <label
              id="label-super"
              class="tier-card relative border-2 border-gray-200 bg-white rounded-lg p-3 cursor-pointer hover:bg-gray-50 flex flex-col items-center text-center"
            >
              <input
                type="radio"
                name="tier"
                value="super"
                class="hidden"
                onchange="updateTier('super', 10)"
              />
              <span class="font-bold text-gray-800 text-sm">Super Pro ✨</span>
              <span class="text-blue-600 font-extrabold text-lg mt-1">$10</span>
              <span class="text-xs text-gray-500 mt-1"
                >Premium UI & Animations</span
              >
            </label>
          </div>
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full btn-primary font-bold py-3 px-4 rounded focus:outline-none focus:shadow-outline mt-6"
        >
          Generate My Website ($5)
        </button>
      </form>
    </div>

    <script>
      // Initialize the Telegram Mini App
      let tg = window.Telegram.WebApp;
      tg.expand();

      // State variables to track selection
      let selectedTier = "pro";
      let selectedPrice = 5;

      // Function to handle UI updates when user clicks a tier
      function updateTier(tier, price) {
        selectedTier = tier;
        selectedPrice = price;

        const labelPro = document.getElementById("label-pro");
        const labelSuper = document.getElementById("label-super");
        const submitBtn = document.getElementById("submit-btn");

        if (tier === "pro") {
          labelPro.classList.add("border-blue-500", "bg-blue-50");
          labelPro.classList.remove("border-gray-200", "bg-white");

          labelSuper.classList.remove("border-blue-500", "bg-blue-50");
          labelSuper.classList.add("border-gray-200", "bg-white");
        } else {
          labelSuper.classList.add("border-blue-500", "bg-blue-50");
          labelSuper.classList.remove("border-gray-200", "bg-white");

          labelPro.classList.remove("border-blue-500", "bg-blue-50");
          labelPro.classList.add("border-gray-200", "bg-white");
        }

        // Dynamically update the button text
        submitBtn.innerText = `Generate My Website ($${price})`;
      }

      // Form submission logic
      document
        .getElementById("businessForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const formData = {
            intent: "form_submitted",
            tier: selectedTier, // "pro" or "super"
            price: selectedPrice, // 5 or 10
            businessName: document.getElementById("businessName").value,
            description: document.getElementById("description").value,
            pages: document.getElementById("pages").value,
            pricing: document.getElementById("pricing").value,
            location: document.getElementById("location").value,
            contact: document.getElementById("contact").value,
          };

          // Send data to Telegram Bot
          tg.sendData(JSON.stringify(formData));

          // Force the app to close
          setTimeout(() => {
            tg.close();
          }, 100);
        });
    </script>
  </body>
</html>
